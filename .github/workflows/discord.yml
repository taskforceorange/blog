name: Notify Discord on New Blog Post

on:
  push:
    paths:
      - "_posts/**"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find latest post
        id: post
        run: |
          FILE=$(ls -t _posts | head -n 1)
          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' _posts/$FILE)
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"📢 Nieuwe blogpost gepubliceerd!\n**${{ steps.post.outputs.title }}**\nhttps://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
