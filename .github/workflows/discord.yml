name: Notify Discord on New Blog Post

on:
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types:
      - completed

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure sent log exists
        run: |
          if [ ! -f .sent_posts ]; then
            touch .sent_posts
          fi

      - name: Detect newest post
        id: postfile
        run: |
          FILE=$(ls -t _posts/*.md | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Extract post info
        id: post
        run: |
          FILE=${{ steps.postfile.outputs.file }}

          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
          THUMB=$(sed -n 's/^thumbnail: "\(.*\)"/\1/p' "$FILE")
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

          # excerpt uit YAML
          EXCERPT=$(sed -n 's/^excerpt: "\(.*\)"/\1/p' "$FILE")

          # als excerpt leeg is → automatisch genereren
          if [ -z "$EXCERPT" ]; then
            CONTENT=$(sed '1,/^---$/d' "$FILE")
            EXCERPT=$(echo "$CONTENT" | sed 's/"/\\"/g' | cut -c1-200)
            EXCERPT="${EXCERPT}..."
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "thumb=$THUMB" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Skip if already sent
        id: check
        run: |
          if grep -q "${{ steps.post.outputs.slug }}" .sent_posts; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if already sent
        if: ${{ steps.check.outputs.skip == 'true' }}
        run: echo "Post already sent. Skipping."

      - name: Send Discord Webhook
        if: ${{ steps.check.outputs.skip == 'false' }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"<@&1493593031218171944>\",
            \"embeds\": [{
              \"title\": \"${{ steps.post.outputs.title }}\",
              \"description\": \"${{ steps.post.outputs.excerpt }}\",
              \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\",
              \"color\": 16744192,
              \"image\": {
                \"url\": \"https://taskforceorange.github.io/blog${{ steps.post.outputs.thumb }}\"
              }
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [{
                \"type\": 2,
                \"style\": 5,
                \"label\": \"Lees het volledige nieuwsbericht\",
                \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\"
              }]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Mark post as sent
        if: ${{ steps.check.outputs.skip == 'false' }}
        run: |
          echo "${{ steps.post.outputs.slug }}" >> .sent_posts
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .sent_posts
          git commit -m "Mark post as sent"
          git push
