name: Notify Discord on New Blog Post

on:
  push:
    paths:
      - "_posts/**"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect added posts
        id: changes
        run: |
          ADDED=$(git diff --name-status HEAD~1 HEAD | grep "^A" | awk '{print $2}')
          echo "added=$ADDED" >> $GITHUB_OUTPUT

      - name: Stop if no new posts
        if: steps.changes.outputs.added == ''
        run: echo "No new posts added. Skipping notification."

      - name: Extract post info
        if: steps.changes.outputs.added != ''
        id: post
        run: |
          FILE=${{ steps.changes.outputs.added }}
          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        if: steps.changes.outputs.added != ''
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"📢 Nieuwe blogpost gepubliceerd!\n**${{ steps.post.outputs.title }}**\nhttps://taskforceorange.nl/blog/post.html?id=${{ steps.post.outputs.slug }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
