name: Notify Discord on New Blog Post

on:
  push:
    paths:
      - "_posts/**"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect added posts
        id: changes
        run: |
          ADDED=$(git diff --name-status HEAD~1 HEAD | grep "^A" | awk '{print $2}')
          echo "added=$ADDED" >> $GITHUB_OUTPUT

      - name: Stop if no new posts
        if: steps.changes.outputs.added == ''
        run: echo "No new posts added. Skipping notification."

      - name: Extract post info
        if: steps.changes.outputs.added != ''
        id: post
        run: |
          FILE=${{ steps.changes.outputs.added }}
          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
          EXCERPT=$(sed -n 's/^excerpt: "\(.*\)"/\1/p' "$FILE")
          THUMB=$(sed -n 's/^thumbnail: "\(.*\)"/\1/p' "$FILE")
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "thumb=$THUMB" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook (Embed)
        if: steps.changes.outputs.added != ''
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"${{ steps.post.outputs.title }}\",
              \"description\": \"${{ steps.post.outputs.excerpt }}\",
              \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\",
              \"color\": 16744192,
              \"thumbnail\": {
                \"url\": \"https://taskforceorange.github.io/blog${{ steps.post.outputs.thumb }}\"
              }
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
