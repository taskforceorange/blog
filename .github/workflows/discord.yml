name: Notify Discord on New Blog Post

on:
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types:
      - completed

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect newly added post
        id: detect
        run: |
          ADDED=$(git diff --name-status HEAD~1 HEAD | grep "^A" | grep "_posts/" | awk '{print $2}')
          echo "added=$ADDED" >> $GITHUB_OUTPUT

      - name: Stop if no new posts
        if: ${{ steps.detect.outputs.added == '' }}
        run: echo "No new posts added. Skipping."

      - name: Extract post info
        if: ${{ steps.detect.outputs.added != '' }}
        id: post
        run: |
          FILE=${{ steps.detect.outputs.added }}

          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
          THUMB=$(sed -n 's/^thumbnail: "\(.*\)"/\1/p' "$FILE")
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

          # excerpt uit YAML
          EXCERPT=$(sed -n 's/^excerpt: "\(.*\)"/\1/p' "$FILE")

          # als excerpt leeg is → automatisch genereren
          if [ -z "$EXCERPT" ]; then
            CONTENT=$(sed '1,/^---$/d' "$FILE")
            EXCERPT=$(echo "$CONTENT" | sed 's/"/\\"/g' | cut -c1-200)
            EXCERPT="${EXCERPT}..."
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "thumb=$THUMB" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook (Embed + Button + Role Tag)
        if: ${{ steps.detect.outputs.added != '' }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"<@&1493593031218171944>\",
            \"embeds\": [{
              \"title\": \"${{ steps.post.outputs.title }}\",
              \"description\": \"${{ steps.post.outputs.excerpt }}\",
              \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\",
              \"color\": 16744192,
              \"image\": {
                \"url\": \"https://taskforceorange.github.io/blog${{ steps.post.outputs.thumb }}\"
              }
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [{
                \"type\": 2,
                \"style\": 5,
                \"label\": \"Lees het volledige nieuwsbericht\",
                \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\"
              }]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
