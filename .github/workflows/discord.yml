name: Notify Discord on New Blog Post

on:
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types:
      - completed

permissions:
  contents: write

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect newest post
        id: postfile
        run: |
          FILE=$(ls -t _posts/*.md | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Check if newest post was newly added
        id: added
        run: |
          FILE=${{ steps.postfile.outputs.file }}
          BASENAME=$(basename "$FILE")
          ADDED=$(git diff --name-status HEAD~1 HEAD | grep "^A" | grep "$BASENAME" || true)

          if [ -z "$ADDED" ]; then
            echo "new=false" >> $GITHUB_OUTPUT
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not newly added
        if: ${{ steps.added.outputs.new == 'false' }}
        run: echo "Post is not new. Skipping."

      - name: Extract post info
        if: ${{ steps.added.outputs.new == 'true' }}
        id: post
        run: |
          FILE=${{ steps.postfile.outputs.file }}

          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
          THUMB=$(sed -n 's/^thumbnail: "\(.*\)"/\1/p' "$FILE")
          PUBLISH=$(sed -n 's/^publish_to_discord: \(.*\)/\1/p' "$FILE")
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

          EXCERPT=$(sed -n 's/^excerpt: "\(.*\)"/\1/p' "$FILE")

          if [ -z "$EXCERPT" ]; then
            CONTENT=$(sed '1,/^---$/d' "$FILE")
            CONTENT=$(echo "$CONTENT" | sed 's/^# //')
            CONTENT=$(echo "$CONTENT" | tr -d '\n')
            EXCERPT=$(echo "$CONTENT" | sed 's/"/\\"/g' | cut -c1-200)
            EXCERPT="${EXCERPT}..."
          else
            EXCERPT=$(echo "$EXCERPT" | tr -d '\n')
            EXCERPT=$(echo "$EXCERPT" | sed 's/"/\\"/g')
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "thumb=$THUMB" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT

      - name: Stop if publish_to_discord is not true
        if: ${{ steps.post.outputs.publish != 'true' }}
        run: echo "publish_to_discord is not true. Skipping."

      - name: Send Discord Webhook
        if: ${{ steps.post.outputs.publish == 'true' && steps.added.outputs.new == 'true' }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"<@&1493593031218171944>\",
            \"embeds\": [{
              \"title\": \"${{ steps.post.outputs.title }}\",
              \"description\": \"${{ steps.post.outputs.excerpt }}\",
              \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\",
              \"color\": 16744192,
              \"image\": {
                \"url\": \"https://taskforceorange.github.io/blog${{ steps.post.outputs.thumb }}\"
              }
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [{
                \"type\": 2,
                \"style\": 5,
                \"label\": \"Lees het volledige nieuwsbericht\",
                \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\"
              }]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
