name: Notify Discord on New Blog Post

on:
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types:
      - completed

permissions:
  contents: write

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: - name: Find post with publish_to_discord true
        id: findpost
        run: |
          TARGET=""
          for FILE in _posts/*.md; do
            FLAG=$(grep "^publish_to_discord: true" "$FILE" || true)
            if [ ! -z "$FLAG" ]; then
              TARGET="$FILE"
              break
            fi
          done

          if [ -z "$TARGET" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "file=$TARGET" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no post needs publishing
        if: ${{ steps.findpost.outputs.found == 'false' }}
        run: echo "No posts with publish_to_discord: true. Skipping."

      - name: Extract post info
        if: ${{ steps.findpost.outputs.found == 'true' }}
        id: post
        run: |
          FILE=${{ steps.findpost.outputs.file }}

          TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
          THUMB=$(sed -n 's/^thumbnail: "\(.*\)"/\1/p' "$FILE")
          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

          EXCERPT=$(sed -n 's/^excerpt: "\(.*\)"/\1/p' "$FILE")

          if [ -z "$EXCERPT" ]; then
            CONTENT=$(sed '1,/^---$/d' "$FILE")
            CONTENT=$(echo "$CONTENT" | sed 's/^# //')
            CONTENT=$(echo "$CONTENT" | tr -d '\n')
            EXCERPT=$(echo "$CONTENT" | sed 's/"/\\"/g' | cut -c1-200)
            EXCERPT="${EXCERPT}..."
          else
            EXCERPT=$(echo "$EXCERPT" | tr -d '\n')
            EXCERPT=$(echo "$EXCERPT" | sed 's/"/\\"/g')
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          echo "thumb=$THUMB" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        if: ${{ steps.findpost.outputs.found == 'true' }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"<@&1493593031218171944>\",
            \"embeds\": [{
              \"title\": \"${{ steps.post.outputs.title }}\",
              \"description\": \"${{ steps.post.outputs.excerpt }}\",
              \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\",
              \"color\": 16744192,
              \"image\": {
                \"url\": \"https://taskforceorange.github.io/blog${{ steps.post.outputs.thumb }}\"
              }
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [{
                \"type\": 2,
                \"style\": 5,
                \"label\": \"Lees het volledige nieuwsbericht\",
                \"url\": \"https://taskforceorange.nl/post.html?id=${{ steps.post.outputs.slug }}\"
              }]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Disable publish_to_discord
        if: ${{ steps.findpost.outputs.found == 'true' }}
        run: |
          FILE=${{ steps.findpost.outputs.file }}
          sed -i 's/publish_to_discord: true/publish_to_discord: false/' "$FILE"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "$FILE"
          git commit -m "Disable publish_to_discord for $FILE"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
